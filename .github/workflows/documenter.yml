name: Documenter
on:
  push:
    branches: [main]
    tags: [v*]
  pull_request:

jobs:
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: julia-actions/setup-julia@latest
        with:
          version: "1.12"
      - name: Julia Cache
        uses: julia-actions/cache@v3
      - name: Install binary dependencies
        run: >
          sudo apt-get update &&
          sudo apt-get install -y xorg-dev mesa-utils xvfb libgl1 freeglut3-dev libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev xsettingsd x11-xserver-utils
      - name: "Documenter rendering (including Quarto)"
        run: >
          DISPLAY=:0 xvfb-run -s '-screen 0 1024x768x24'
          docs/make.jl --quarto --prettyurls
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DOCUMENTER_KEY: ${{ secrets.DOCUMENTER_KEY }}